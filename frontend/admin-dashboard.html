<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">

            <span class="navbar-brand fw-bold">
                Admin Dashboard
            </span>

            <button class="btn btn-light" onclick="logout()">
                Đăng xuất
            </button>

        </div>

    </nav>

    <div class="container py-5">

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow text-center p-4">
                    <h2 id="medicineCount">0</h2>
                    <p>Tổng thuốc</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow text-center p-4">
                    <h2 id="diseaseCount">5</h2>
                    <p>Bệnh nền</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow text-center p-4">
                    <h2>15</h2>
                    <p>Cảnh báo</p>
                </div>
            </div>

        </div>

        <hr class="my-5">

        <h3>Thêm thuốc mới</h3>

        <div class="row mb-4">

            <div class="col-md-8">
                <input type="text" id="medicineName" class="form-control" placeholder="Tên thuốc">
            </div>

            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="addMedicine()">
                    Thêm thuốc
                </button>
            </div>

        </div>

        <h3>Danh sách thuốc</h3>

        <table class="table table-bordered">

            <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Tên thuốc</th>
                    <th>Thao tác</th>
                </tr>

            </thead>

            <tbody id="medicineTable">

            </tbody>

        </table>

        <hr class="my-5">

        <h3>Quản lý bệnh nền</h3>

        <div class="row mb-4">

            <div class="col-md-8">
                <input type="text" id="diseaseName" class="form-control" placeholder="Tên bệnh nền">
            </div>

            <div class="col-md-4">
                <button class="btn btn-warning w-100" onclick="addDisease()">
                    Thêm bệnh nền
                </button>
            </div>

        </div>

        <table class="table table-bordered">

            <thead class="table-warning">

                <tr>
                    <th>ID</th>
                    <th>Tên bệnh nền</th>
                    <th>Thao tác</th>
                </tr>

            </thead>

            <tbody id="diseaseTable">

            </tbody>

        </table>

    </div>

    <script src="js/auth.js"></script>

    <script src="js/admin.js"></script>

    <script>

        checkAdmin();

    </script>

</body>

</html>
