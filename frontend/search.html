<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu thuốc</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                💊 Drug Warning
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Trang chủ
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="search.html">
                            Tra cứu thuốc
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="guide.html">
                            Hướng dẫn
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Nội dung -->
    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow border-0">

                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">
                            Tra cứu thuốc
                        </h2>

                        <!-- Chọn thuốc -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nhập tên thuốc
                            </label>

                            <input type="text" id="medicineInput" class="form-control" placeholder="Ví dụ: Paracetamol">

                        </div>

                        <!-- Chọn bệnh nền -->
                        <div class="mb-4">

                            <label class="form-label">
                                Chọn bệnh nền
                            </label>

                            <select id="diseaseSelect" class="form-select">

                                <option value="">
                                    -- Chọn bệnh nền --
                                </option>

                                <option value="Tiểu đường">
                                    Tiểu đường
                                </option>

                                <option value="Tăng huyết áp">
                                    Tăng huyết áp
                                </option>

                                <option value="Tim mạch">
                                    Tim mạch
                                </option>

                                <option value="Suy thận">
                                    Suy thận
                                </option>

                                <option value="Hen suyễn">
                                    Hen suyễn
                                </option>

                            </select>

                        </div>

                        <button class="btn btn-primary w-100" onclick="searchMedicine()">

                            Tra cứu

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-primary text-white text-center py-3 mt-5">

        Drug Warning System © 2026

    </footer>

    <!-- API -->
    <script src="js/api.js"></script>

    <script>

        const medicineSelect =
            document.getElementById(
                "medicineSelect"
            );

        medicines.forEach(
            medicine => {

                medicineSelect.innerHTML += `
                <option value="${medicine.name}">
                    ${medicine.name}
                </option>
                `;
            }
        );

        function searchMedicine() {

            const medicine =
                document
                    .getElementById(
                        "medicineInput"
                    )
                    .value
                    .trim();

            const disease =
                document
                    .getElementById(
                        "diseaseSelect"
                    )
                    .value;

            if (
                medicine === "" ||
                disease === ""
            ) {

                alert(
                    "Vui lòng nhập tên thuốc và chọn bệnh nền"
                );

                return;
            }

            window.location.href =
                `warning-result.html?medicine=${encodeURIComponent(medicine)}&disease=${encodeURIComponent(disease)}`;

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
