<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">💊 Drug Warning</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link active" href="search.html">Tra cứu thuốc</a></li>
                <li class="nav-item"><a class="nav-link" href="ai-assistant.html">AI hỗ trợ</a></li>
                <li class="nav-item"><a class="nav-link" href="guide.html">Hướng dẫn</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Tra cứu thuốc theo bệnh nền</h2>
                    <div class="alert alert-info">
                        Nhập tên thuốc và chọn bệnh nền. Hệ thống sẽ kiểm tra dữ liệu cảnh báo từ backend PostgreSQL.
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên thuốc</label>
                        <input type="text" id="medicineInput" class="form-control" list="medicineList" placeholder="Ví dụ: Ibuprofen">
                        <datalist id="medicineList"></datalist>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Bệnh nền</label>
                        <select id="diseaseSelect" class="form-select">
                            <option value="">-- Đang tải bệnh nền --</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100" onclick="searchMedicine()">Tra cứu</button>
                    <a href="ai-assistant.html" class="btn btn-outline-primary w-100 mt-3">Dùng AI phân tích nhiều thuốc</a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="bg-primary text-white text-center py-3 mt-5">Drug Warning System © 2026</footer>
<script src="js/config.js"></script>
<script>
async function loadData() {
    try {
        const medicines = await apiGet('/Medicines');
        const diseases = await apiGet('/Diseases');
        const medicineList = document.getElementById('medicineList');
        const diseaseSelect = document.getElementById('diseaseSelect');

        medicineList.innerHTML = medicines.map(m => `<option value="${m.name}"></option>`).join('');
        diseaseSelect.innerHTML = '<option value="">-- Chọn bệnh nền --</option>' +
            diseases.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
    } catch (error) {
        document.getElementById('diseaseSelect').innerHTML = '<option value="">Không kết nối được backend</option>';
        alert('Không kết nối được backend. Hãy chạy: dotnet run tại backend/DrugWarningAPI');
    }
}

function searchMedicine() {
    const medicine = document.getElementById('medicineInput').value.trim();
    const disease = document.getElementById('diseaseSelect').value;

    if (!medicine || !disease) {
        alert('Vui lòng nhập tên thuốc và chọn bệnh nền');
        return;
    }

    window.location.href = `warning-result.html?medicine=${encodeURIComponent(medicine)}&disease=${encodeURIComponent(disease)}`;
}

loadData();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
