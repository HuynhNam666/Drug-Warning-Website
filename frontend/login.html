<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                💊 Drug Warning
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Trang chủ
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="search.html">
                            Tra cứu thuốc
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="guide.html">
                            Hướng dẫn
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">
                            Đăng nhập
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow border-0">

                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">
                            Đăng nhập
                        </h2>

                        <div class="mb-3">

                            <label class="form-label">
                                Tên đăng nhập
                            </label>

                            <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">

                        </div>

                        <div id="loginError" class="alert alert-danger d-none">
                        </div>

                        <button class="btn btn-primary w-100" onclick="login()">

                            Đăng nhập

                        </button>

                        <div class="text-center mt-3">

                            Chưa có tài khoản?

                            <a href="register.html">
                                Đăng ký ngay
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer class="bg-primary text-white text-center py-3 mt-auto">

        Drug Warning System © 2026

    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>

        const currentUser =
            JSON.parse(
                localStorage.getItem("currentUser")
            );

        if (currentUser) {

            if (currentUser.role === "admin") {

                window.location.href =
                    "admin-dashboard.html";

            } else {

                window.location.href =
                    "index.html";

            }

        }

        document.addEventListener(
            "keypress",
            function (e) {

                if (e.key === "Enter") {

                    login();

                }

            }
        );

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
