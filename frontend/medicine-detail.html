<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết thuốc</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                💊 Drug Warning
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Trang chủ
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="search.html">
                            Tra cứu thuốc
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="disease.html">
                            Bệnh nền
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="guide.html">
                            Hướng dẫn
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="detail-card">

                    <h2 id="medicineName">
                        Đang tải...
                    </h2>

                    <hr>

                    <h5>Mô tả thuốc</h5>

                    <p id="medicineDescription">
                        ...
                    </p>

                    <h5>Bệnh nền liên quan</h5>

                    <ul id="diseaseList">

                    </ul>

                    <h5>Mức cảnh báo</h5>

                    <div id="warningLevel">

                    </div>

                    <div class="mt-4">

                        <button class="btn btn-warning" onclick="checkWarning()">

                            Kiểm tra cảnh báo

                        </button>

                        <a href="search.html" class="btn btn-secondary">

                            Quay lại

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <footer>

        <div class="container text-center">

            <p>
                Drug Warning System © 2026
            </p>

        </div>

    </footer>

    <script>

        const medicine =
            JSON.parse(localStorage.getItem("medicine"));

        if (medicine) {

            document.getElementById("medicineName")
                .innerText = medicine.name;

            document.getElementById("medicineDescription")
                .innerText = medicine.description;

            let diseases = "";

            medicine.disease.forEach(item => {

                diseases += `
            <li>${item}</li>
        `;

            });

            document.getElementById("diseaseList")
                .innerHTML = diseases;

            let levelHtml = "";

            if (medicine.level === "safe") {

                levelHtml =
                    `
        <span class="badge bg-success p-2">
            🟢 AN TOÀN
        </span>
        `;

            }

            if (medicine.level === "warning") {

                levelHtml =
                    `
        <span class="badge bg-warning text-dark p-2">
            🟡 THẬN TRỌNG
        </span>
        `;

            }

            if (medicine.level === "danger") {

                levelHtml =
                    `
        <span class="badge bg-danger p-2">
            🔴 CHỐNG CHỈ ĐỊNH
        </span>
        `;

            }

            document.getElementById("warningLevel")
                .innerHTML = levelHtml;

        }

        function checkWarning() {

            window.location.href =
                "warning-result.html";

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
