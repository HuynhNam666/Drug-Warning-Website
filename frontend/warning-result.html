    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                💊 Drug Warning
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Trang chủ
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="search.html">
                            Tra cứu thuốc
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="guide.html">
                            Hướng dẫn
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Nội dung -->
    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow border-0 p-4">

                    <h2 class="text-center mb-4">
                        Kết quả cảnh báo
                    </h2>

                    <div class="mb-4">

                        <h5>Tên thuốc</h5>

                        <p id="medicineName">
                            Đang tải...
                        </p>

                    </div>

                    <div class="mb-4">

                        <h5>Bệnh nền</h5>

                        <p id="diseaseName">
                            Đang tải...
                        </p>

                    </div>

                    <div class="mb-4">

                        <h5>Mức độ cảnh báo</h5>

                        <div id="warningLevel">

                        </div>

                    </div>

                    <div class="mb-4">

                        <h5>Khuyến nghị</h5>

                        <div id="warningMessage">

                        </div>

                    </div>

                    <div class="text-center">

                        <a href="search.html" class="btn btn-primary">

                            Tra cứu lại

                        </a>

                        <a href="index.html" class="btn btn-secondary">

                            Trang chủ

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-primary text-white text-center py-3">

        Drug Warning System © 2026

    </footer>

    <!-- API -->
    <script src="js/api.js"></script>

    <!-- Xử lý kết quả -->
    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const medicineName =
            params.get("medicine");

        const diseaseName =
            params.get("disease");

        const medicine =
            medicines.find(
                m =>
                    m.name.toLowerCase() ===
                    medicineName.toLowerCase()
            );

        if (!medicine) {

            document
                .getElementById("medicineName")
                .innerText =
                "Không tìm thấy thuốc";

            document
                .getElementById("diseaseName")
                .innerText =
                "-";

            document
                .getElementById("warningLevel")
                .innerHTML =
                `
                <span class="badge bg-secondary p-3">
                    Không có dữ liệu
                </span>
                `;

            document
                .getElementById("warningMessage")
                .innerHTML =
                `
                <div class="alert alert-danger">
                    Không tìm thấy dữ liệu thuốc.
                </div>
                `;

        }
        else {

            document
                .getElementById("medicineName")
                .innerText =
                medicine.name;

            document
                .getElementById("diseaseName")
                .innerText =
                diseaseName;

            const warning =
                medicine.warnings.find(
                    w => w.disease === diseaseName
                );

            let levelHTML = "";
            let messageHTML = "";

            if (warning) {

                switch (warning.level) {

                    case "An toàn":

                        levelHTML = `
                        <span class="badge bg-success p-3">
                            🟢 AN TOÀN
                        </span>
                        `;
                        break;

                    case "Thận trọng":

                        levelHTML = `
                        <span class="badge bg-warning text-dark p-3">
                            🟡 THẬN TRỌNG
                        </span>
                        `;
                        break;

                    case "Nguy cơ cao":

                        levelHTML = `
                        <span class="badge bg-danger p-3">
                            🔴 NGUY CƠ CAO
                        </span>
                        `;
                        break;

                    case "Không khuyến cáo":

                        levelHTML = `
                        <span class="badge bg-dark p-3">
                            ⚫ KHÔNG KHUYẾN CÁO
                        </span>
                        `;
                        break;

                    default:

                        levelHTML = `
                        <span class="badge bg-secondary p-3">
                            ⚪ CHƯA XÁC ĐỊNH
                        </span>
                        `;
                }

                messageHTML = `
                <div class="alert alert-info">
                    ${warning.note}
                </div>
                `;

            }
            else {

                levelHTML = `
                <span class="badge bg-secondary p-3">
                    ⚪ CHƯA CÓ DỮ LIỆU
                </span>
                `;

                messageHTML = `
                <div class="alert alert-secondary">
                    Hiện chưa có dữ liệu cảnh báo cho bệnh nền này.
                </div>
                `;
            }

            document
                .getElementById("warningLevel")
                .innerHTML =
                levelHTML;

            document
                .getElementById("warningMessage")
                .innerHTML =
                messageHTML;

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
