<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả cảnh báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">💊 Drug Warning</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="search.html">Tra cứu thuốc</a></li>
                <li class="nav-item"><a class="nav-link" href="ai-assistant.html">AI hỗ trợ</a></li>
                <li class="nav-item"><a class="nav-link" href="guide.html">Hướng dẫn</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow border-0 p-4">
                <h2 class="text-center mb-4">Kết quả cảnh báo</h2>
                <div id="resultBox">Đang tải...</div>
                <div class="text-center mt-4">
                    <a href="search.html" class="btn btn-primary">Tra cứu lại</a>
                    <a href="ai-assistant.html" class="btn btn-outline-primary">Phân tích bằng AI</a>
                    <a href="index.html" class="btn btn-secondary">Trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</section>
<footer class="bg-primary text-white text-center py-3">Drug Warning System © 2026</footer>
<script src="js/config.js"></script>
<script>
function badge(level) {
    const map = {
        Critical: 'danger',
        High: 'danger',
        Medium: 'warning text-dark',
        Low: 'success'
    };
    return `<span class="badge bg-${map[level] || 'secondary'} p-2">${level}</span>`;
}

async function loadResult() {
    const params = new URLSearchParams(window.location.search);
    const medicine = params.get('medicine') || '';
    const disease = params.get('disease') || '';
    const box = document.getElementById('resultBox');

    try {
        const result = await apiGet(`/Warnings/search?medicineName=${encodeURIComponent(medicine)}&diseaseName=${encodeURIComponent(disease)}`);
        if (!result.found) {
            box.innerHTML = `
                <h5>Thuốc: ${medicine}</h5>
                <h5>Bệnh nền: ${disease}</h5>
                <div class="alert alert-secondary mt-3">${result.message}</div>
                <div class="alert alert-warning">Kết quả không thay thế tư vấn y tế chuyên môn.</div>`;
            return;
        }

        box.innerHTML = `
            <h5>Thuốc: ${medicine}</h5>
            <h5>Bệnh nền: ${disease}</h5>
            <div class="mt-4">
                ${result.warnings.map(w => `
                    <div class="border rounded p-3 mb-3">
                        <div class="mb-2">Mức độ: ${badge(w.riskLevel)}</div>
                        <p><strong>Cảnh báo:</strong> ${w.warningContent}</p>
                        <p><strong>Khuyến nghị:</strong> ${w.recommendation || 'Hỏi bác sĩ/dược sĩ trước khi dùng.'}</p>
                    </div>
                `).join('')}
            </div>
            <div class="alert alert-warning">Kết quả chỉ hỗ trợ sàng lọc ban đầu, không thay thế chỉ định của bác sĩ.</div>`;
    } catch (error) {
        box.innerHTML = `<div class="alert alert-danger">Không kết nối được backend. Hãy chạy API tại http://localhost:5000</div>`;
    }
}

loadResult();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
